[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "casegraph-agent-sdk"
version = "0.1.0"
description = "Shared schemas and contracts for CaseGraph agents"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.11.0",
]

[tool.setuptools]
packages = ["casegraph_agent_sdk"]
